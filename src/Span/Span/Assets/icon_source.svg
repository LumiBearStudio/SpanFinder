<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Column 1 (left) - parent, subtle -->
  <rect x="81" y="130" width="90" height="252" rx="16" fill="#ffffff" opacity="0.28"/>

  <!-- Column 2 (center) - active, prominent -->
  <rect x="211" y="130" width="90" height="252" rx="16" fill="#ffffff" opacity="0.88"/>

  <!-- Column 3 (right) - children, medium -->
  <rect x="341" y="130" width="90" height="252" rx="16" fill="#ffffff" opacity="0.38"/>
</svg>
